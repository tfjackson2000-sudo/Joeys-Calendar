<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joey's Calendar</title>
    <style>
        :root {
            --bg-color: #000000;
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --light-gray: #333333;
            --text-color: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3 {
            color: var(--gold);
            text-align: center;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            justify-content: center;
            background-color: var(--light-gray);
            border-bottom: 2px solid var(--gold);
            padding: 10px 0;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background-color: var(--gold);
            color: var(--bg-color);
        }

        /* Views */
        .view {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .view.active {
            display: block;
        }

        /* Calendar Controls */
        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-controls button, input[type="date"], input[type="month"], input[type="color"], input[type="text"], select {
            background-color: var(--light-gray);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px;
            border-radius: 4px;
        }

        .calendar-controls button {
            cursor: pointer;
            font-weight: bold;
        }

        .calendar-controls button:hover {
            background-color: var(--gold);
            color: var(--bg-color);
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            color: var(--gold);
            font-weight: bold;
            padding: 10px 0;
        }

        .calendar-day {
            min-height: 100px;
            border: 1px solid var(--light-gray);
            padding: 5px;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
            overflow: hidden;
            border-radius: 5px;
        }

        .calendar-day:hover {
            border-color: var(--gold);
        }

        .calendar-day.today {
            outline: 3px solid var(--gold);
            outline-offset: -3px;
        }

        .day-number {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .day-event-indicator {
            font-size: 12px;
            background-color: var(--gold);
            color: var(--bg-color);
            padding: 2px 4px;
            border-radius: 3px;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Routine Section */
        .routines-section {
            margin-top: 30px;
            padding: 15px;
            background: var(--light-gray);
            border-radius: 8px;
            border: 1px solid #444;
        }

        .routine-group {
            margin-bottom: 15px;
        }

        .routine-days {
            display: flex;
            gap: 5px;
            flex-wrap: nowrap; /* Forces a single row */
        }

        .routine-btn {
            background: var(--bg-color);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 0; /* Reduced padding to fit mobile */
            border-radius: 4px;
            cursor: pointer;
            flex: 1; /* Makes them all strictly the exact same size */
            text-align: center;
            font-weight: bold;
            display: flex;
            flex-direction: column; /* Stack text and badge on small screens */
            justify-content: center;
            align-items: center;
            gap: 3px;
            font-size: 13px; /* Slightly smaller text for fit */
        }

        .routine-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .routine-badge {
            font-size: 11px;
            background: var(--gold);
            color: var(--bg-color);
            border-radius: 50%;
            padding: 2px 6px;
        }

        /* Modal Overlays */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-box {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #111;
            border: 2px solid var(--gold);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 8px;
            z-index: 1001;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--light-gray);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .close-btn {
            background: transparent;
            color: var(--gold);
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .event-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            background: var(--light-gray);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
        }

        .event-actions button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            border-radius: 3px;
            margin-left: 5px;
        }

        .event-actions button:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .add-event-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .add-event-form select, .add-event-form button {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--gold);
            background: var(--light-gray);
            color: var(--gold);
        }

        .add-event-form button {
            background: var(--gold);
            color: var(--bg-color);
            cursor: pointer;
            font-weight: bold;
        }

        /* Admin Section */
        .admin-section {
            background: var(--light-gray);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .activity-list {
            margin-top: 10px;
            padding-left: 20px;
        }
        
        .activity-item {
            display: flex;
            justify-content: space-between;
            max-width: 300px;
            margin-bottom: 5px;
        }
        
        .delete-btn {
            color: #ff4d4d;
            background: transparent;
            border: 1px solid #ff4d4d;
            cursor: pointer;
            border-radius: 3px;
        }
        .delete-btn:hover { background: #ff4d4d; color: white; }

        .date-picker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('calendar')">Calendar</button>
        <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="view-calendar" class="view active">
        <h1>Joey's Calendar</h1>
        
        <div class="calendar-controls">
            <button onclick="changeMonth(-1)">&#9664; Prev</button>
            <div class="date-picker-container">
                <h2 id="month-year-display" style="margin: 0 0 5px 0;"></h2>
                <input type="month" id="month-picker" onchange="jumpToDate()">
            </div>
            <button onclick="changeMonth(1)">Next &#9654;</button>
        </div>

        <div class="calendar-grid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>
        <div class="calendar-grid" id="calendar-body">
            </div>

        <div class="routines-section">
            <h3 style="margin-top: 0;">Weekly Routines</h3>
            <p style="font-size: 12px; color: #aaa; text-align: center; margin-top: -10px;">Select a day below to set activities that happen every week.</p>
            
            <div class="routine-group">
                <h4 style="color: var(--text-color); margin: 0 0 5px 0;">School Week</h4>
                <div class="routine-days" id="school-routine-days"></div>
            </div>
            
            <div class="routine-group">
                <h4 style="color: var(--text-color); margin: 0 0 5px 0;">Holiday Week</h4>
                <div class="routine-days" id="holiday-routine-days"></div>
            </div>
        </div>
    </div>

    <div id="view-admin" class="view">
        <h1>Admin Settings</h1>

        <div class="admin-section">
            <h3>Day Colors</h3>
            <div class="admin-grid">
                <div class="form-group">
                    <label>School Week Day Color:</label>
                    <input type="color" id="col-school-week" value="#222222">
                </div>
                <div class="form-group">
                    <label>School Weekend Day Color:</label>
                    <input type="color" id="col-school-end" value="#333333">
                </div>
                <div class="form-group">
                    <label>Holiday Week Day Color:</label>
                    <input type="color" id="col-hol-week" value="#4A3B00">
                </div>
                <div class="form-group">
                    <label>Holiday Weekend Day Color:</label>
                    <input type="color" id="col-hol-end" value="#665200">
                </div>
            </div>
        </div>

        <div class="admin-section">
            <h3>Periods</h3>
            <div class="admin-grid">
                <div class="form-group">
                    <label>School Period Start:</label>
                    <input type="date" id="school-start">
                </div>
                <div class="form-group">
                    <label>School Period End:</label>
                    <input type="date" id="school-end">
                </div>
                <div class="form-group">
                    <label>Holiday Period Start:</label>
                    <input type="date" id="holiday-start">
                </div>
                <div class="form-group">
                    <label>Holiday Period End:</label>
                    <input type="date" id="holiday-end">
                </div>
            </div>
        </div>

        <div class="admin-section">
            <h3>Available Activities</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="new-activity" placeholder="E.g., Stretch, Run 5km" style="flex-grow: 1;">
                <button class="tab-btn" onclick="addActivityDef()" style="margin:0;">Add Activity</button>
            </div>
            <ul id="activity-list" class="activity-list">
                </ul>
        </div>
        
        <div style="text-align: center;">
            <button class="tab-btn" onclick="saveAdminSettings()" style="background: var(--gold); color: var(--bg-color);">Save All Admin Settings</button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-date-title" style="margin: 0;">Date</h3>
                <button class="close-btn" onclick="closeModal('modal-overlay')">&times;</button>
            </div>
            
            <ul id="modal-event-list" class="event-list">
                </ul>

            <div class="add-event-form">
                <label style="color: var(--gold); font-size: 14px;">Add Specific Activity:</label>
                <select id="modal-activity-select">
                    </select>
                <button onclick="addEventToDate()">Add to this Day</button>
            </div>
        </div>
    </div>

    <div id="routine-modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="routine-modal-title" style="margin: 0;">Routine</h3>
                <button class="close-btn" onclick="closeModal('routine-modal-overlay')">&times;</button>
            </div>
            
            <ul id="routine-event-list" class="event-list">
                </ul>

            <div class="add-event-form">
                <label style="color: var(--gold); font-size: 14px;">Add to Routine:</label>
                <select id="routine-activity-select">
                    </select>
                <button onclick="addRoutineEvent()">Add to Weekly Routine</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Data ---
        let currentDate = new Date();
        let selectedDateStr = "";
        
        let selectedRoutineType = ""; // 'school' or 'holiday'
        let selectedRoutineDay = 0; // 0-6 (Sun-Sat)
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const dayNamesShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        // Default Data
        const defaultData = {
            events: {}, 
            activities: ["Morning Stretch", "Cardio", "Weight Lifting", "Homework", "Rest Day"],
            settings: {
                colSchoolWeek: "#222222",
                colSchoolEnd: "#333333",
                colHolWeek: "#4A3B00",
                colHolEnd: "#665200",
                schoolStart: "",
                schoolEnd: "",
                holidayStart: "",
                holidayEnd: ""
            },
            routines: {
                school: {0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[]},
                holiday: {0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[]}
            }
        };

        // Load from LocalStorage or use defaults
        let appData = JSON.parse(localStorage.getItem("joeysCalendar")) || defaultData;
        
        // Ensure data structures exist for older saves
        if(!appData.events) appData.events = {};
        if(!appData.activities) appData.activities = defaultData.activities;
        if(!appData.settings) appData.settings = defaultData.settings;
        if(!appData.routines) appData.routines = defaultData.routines;

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        // --- Initialization ---
        window.onload = () => {
            loadAdminSettings();
            renderCalendar();
            renderRoutines();
            renderAdminActivities();
        };

        function saveData() {
            localStorage.setItem("joeysCalendar", JSON.stringify(appData));
        }

        // --- Navigation ---
        function switchTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`view-${tab}`).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'calendar') {
                renderCalendar(); 
            }
        }

        // --- Utility ---
        function isDateInRange(dateObj, startStr, endStr) {
            if (!startStr || !endStr) return false;
            let target = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()).getTime();
            
            let sSplit = startStr.split('-');
            let start = new Date(sSplit[0], sSplit[1]-1, sSplit[2]).getTime();
            
            let eSplit = endStr.split('-');
            let end = new Date(eSplit[0], eSplit[1]-1, eSplit[2]).getTime();
            
            return target >= start && target <= end;
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = "none";
        }

        // --- Calendar Logic ---
        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function jumpToDate() {
            const pickerVal = document.getElementById("month-picker").value;
            if (pickerVal) {
                const parts = pickerVal.split('-');
                currentDate.setFullYear(parseInt(parts[0]));
                currentDate.setMonth(parseInt(parts[1]) - 1);
                renderCalendar();
            }
        }

        function getDayColor(dateObj) {
            let dayOfWeek = dateObj.getDay();
            let isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            
            let isHoliday = isDateInRange(dateObj, appData.settings.holidayStart, appData.settings.holidayEnd);
            let isSchool = isDateInRange(dateObj, appData.settings.schoolStart, appData.settings.schoolEnd);

            if (isHoliday) {
                return isWeekend ? appData.settings.colHolEnd : appData.settings.colHolWeek;
            } else if (isSchool) {
                return isWeekend ? appData.settings.colSchoolEnd : appData.settings.colSchoolWeek;
            }
            return "#111111"; 
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById("month-year-display").innerText = `${months[month]} ${year}`;
            
            const paddedMonth = String(month + 1).padStart(2, '0');
            document.getElementById("month-picker").value = `${year}-${paddedMonth}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            const calendarBody = document.getElementById("calendar-body");
            calendarBody.innerHTML = "";

            // Empty slots
            for (let i = 0; i < firstDay; i++) {
                let emptyDiv = document.createElement("div");
                calendarBody.appendChild(emptyDiv);
            }

            // Days of the month
            for (let i = 1; i <= daysInMonth; i++) {
                let dayDiv = document.createElement("div");
                dayDiv.className = "calendar-day";
                
                let currentDayObj = new Date(year, month, i);
                dayDiv.style.backgroundColor = getDayColor(currentDayObj);

                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    dayDiv.classList.add("today");
                }

                let dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                let dayOfWeek = currentDayObj.getDay();
                
                let isHoliday = isDateInRange(currentDayObj, appData.settings.holidayStart, appData.settings.holidayEnd);
                let isSchool = isDateInRange(currentDayObj, appData.settings.schoolStart, appData.settings.schoolEnd);

                dayDiv.innerHTML = `<span class="day-number">${i}</span>`;
                
                // Combine routines and specific date events
                let dayRoutines = [];
                if (isHoliday) dayRoutines = appData.routines.holiday[dayOfWeek] || [];
                else if (isSchool) dayRoutines = appData.routines.school[dayOfWeek] || [];
                
                let specificEvents = appData.events[dateStr] || [];
                let allEvents = [...dayRoutines, ...specificEvents];

                allEvents.forEach(evt => {
                    let evtDiv = document.createElement("div");
                    evtDiv.className = "day-event-indicator";
                    evtDiv.innerText = evt;
                    dayDiv.appendChild(evtDiv);
                });

                dayDiv.onclick = () => openDayModal(dateStr, months[month], i, year, currentDayObj);
                calendarBody.appendChild(dayDiv);
            }
        }

        // --- Weekly Routine Logic ---
        function renderRoutines() {
            // Monday is 1, Sunday is 0. Array orders them Mon -> Sun
            const dayOrder = [1, 2, 3, 4, 5, 6, 0]; 

            ["school", "holiday"].forEach(type => {
                let container = document.getElementById(`${type}-routine-days`);
                container.innerHTML = "";
                
                dayOrder.forEach(i => {
                    let btn = document.createElement("button");
                    btn.className = "routine-btn";
                    let count = appData.routines[type][i].length;
                    
                    btn.innerHTML = `<span>${dayNamesShort[i]}</span>`;
                    if(count > 0) {
                        btn.innerHTML += `<span class="routine-badge">${count}</span>`;
                        btn.style.borderColor = "var(--gold)";
                    } else {
                        btn.style.borderColor = "#666";
                        btn.style.color = "#aaa";
                    }
                    
                    btn.onclick = () => openRoutineModal(type, i);
                    container.appendChild(btn);
                });
            });
        }

        function openRoutineModal(type, dayIndex) {
            selectedRoutineType = type;
            selectedRoutineDay = dayIndex;
            
            let typeLabel = type === 'school' ? 'School Week' : 'Holiday Week';
            document.getElementById("routine-modal-title").innerText = `${typeLabel} - ${dayNames[dayIndex]}`;
            
            renderRoutineEventsList();
            
            let select = document.getElementById("routine-activity-select");
            select.innerHTML = "";
            appData.activities.forEach(act => {
                let opt = document.createElement("option");
                opt.value = act;
                opt.text = act;
                select.appendChild(opt);
            });

            document.getElementById("routine-modal-overlay").style.display = "block";
        }

        function renderRoutineEventsList() {
            let list = document.getElementById("routine-event-list");
            list.innerHTML = "";
            let routines = appData.routines[selectedRoutineType][selectedRoutineDay];
            
            if (routines.length === 0) {
                list.innerHTML = "<li style='color: #aaa;'>No routine set for this day.</li>";
                return;
            }

            routines.forEach((evt, index) => {
                let li = document.createElement("li");
                li.className = "event-item";
                li.innerHTML = `
                    <span>&#10227; ${evt}</span>
                    <div class="event-actions">
                        <button onclick="removeRoutineEvent(${index})" class="delete-btn">X</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function addRoutineEvent() {
            let val = document.getElementById("routine-activity-select").value;
            if (!val) return;
            appData.routines[selectedRoutineType][selectedRoutineDay].push(val);
            saveData();
            renderRoutineEventsList();
            renderRoutines();
            renderCalendar();
        }

        function removeRoutineEvent(index) {
            appData.routines[selectedRoutineType][selectedRoutineDay].splice(index, 1);
            saveData();
            renderRoutineEventsList();
            renderRoutines();
            renderCalendar();
        }

        // --- Specific Date Modal Logic ---
        function openDayModal(dateStr, monthName, dayNum, year, dateObj) {
            selectedDateStr = dateStr;
            document.getElementById("modal-date-title").innerText = `${monthName} ${dayNum}, ${year}`;
            
            renderModalEvents(dateObj);
            
            let select = document.getElementById("modal-activity-select");
            select.innerHTML = "";
            appData.activities.forEach(act => {
                let opt = document.createElement("option");
                opt.value = act;
                opt.text = act;
                select.appendChild(opt);
            });

            document.getElementById("modal-overlay").style.display = "block";
        }

        function renderModalEvents(dateObj) {
            let list = document.getElementById("modal-event-list");
            list.innerHTML = "";
            
            let dayOfWeek = dateObj.getDay();
            let isHoliday = isDateInRange(dateObj, appData.settings.holidayStart, appData.settings.holidayEnd);
            let isSchool = isDateInRange(dateObj, appData.settings.schoolStart, appData.settings.schoolEnd);
            
            let routineEvents = [];
            let routineLabel = "";
            
            if (isHoliday) {
                routineEvents = appData.routines.holiday[dayOfWeek] || [];
                routineLabel = "Holiday Routine";
            } else if (isSchool) {
                routineEvents = appData.routines.school[dayOfWeek] || [];
                routineLabel = "School Routine";
            }

            let specificEvents = appData.events[selectedDateStr] || [];
            
            if (routineEvents.length === 0 && specificEvents.length === 0) {
                list.innerHTML = "<li style='color: #aaa;'>No activities for this day.</li>";
                return;
            }

            // Render read-only routines first
            if (routineEvents.length > 0) {
                let header = document.createElement("li");
                header.innerHTML = `<strong style="color:var(--gold); font-size:12px;">${routineLabel} (Edit in Weekly Routines)</strong>`;
                header.style.background = "none";
                header.style.padding = "5px 0";
                list.appendChild(header);

                routineEvents.forEach(evt => {
                    let li = document.createElement("li");
                    li.className = "event-item";
                    li.style.borderLeft = "3px solid var(--gold)";
                    li.innerHTML = `<span style="color:#ccc;">&#10227; ${evt}</span>`;
                    list.appendChild(li);
                });
            }

            // Render specific editable events
            if (specificEvents.length > 0) {
                 let header = document.createElement("li");
                 header.innerHTML = `<strong style="color:var(--gold); font-size:12px;">Specific Date Activities</strong>`;
                 header.style.background = "none";
                 header.style.padding = "10px 0 5px 0";
                 list.appendChild(header);
            }

            specificEvents.forEach((evt, index) => {
                let li = document.createElement("li");
                li.className = "event-item";
                li.innerHTML = `
                    <span>${evt}</span>
                    <div class="event-actions">
                        <button onclick="editEvent(${index})">Edit</button>
                        <button onclick="removeEvent(${index})" class="delete-btn">X</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function addEventToDate() {
            let select = document.getElementById("modal-activity-select");
            let val = select.value;
            if (!val) return;

            if (!appData.events[selectedDateStr]) {
                appData.events[selectedDateStr] = [];
            }
            appData.events[selectedDateStr].push(val);
            saveData();
            
            // Re-render modal to show new specific event
            let parts = selectedDateStr.split('-');
            let dObj = new Date(parts[0], parts[1]-1, parts[2]);
            renderModalEvents(dObj);
            renderCalendar();
        }

        function removeEvent(index) {
            appData.events[selectedDateStr].splice(index, 1);
            if(appData.events[selectedDateStr].length === 0) {
                delete appData.events[selectedDateStr];
            }
            saveData();
            
            let parts = selectedDateStr.split('-');
            let dObj = new Date(parts[0], parts[1]-1, parts[2]);
            renderModalEvents(dObj);
            renderCalendar();
        }

        function editEvent(index) {
            let currentVal = appData.events[selectedDateStr][index];
            let newVal = prompt("Edit your specific activity:", currentVal);
            if (newVal !== null && newVal.trim() !== "") {
                appData.events[selectedDateStr][index] = newVal.trim();
                saveData();
                let parts = selectedDateStr.split('-');
                let dObj = new Date(parts[0], parts[1]-1, parts[2]);
                renderModalEvents(dObj);
                renderCalendar();
            }
        }

        // --- Admin Logic ---
        function loadAdminSettings() {
            document.getElementById("col-school-week").value = appData.settings.colSchoolWeek;
            document.getElementById("col-school-end").value = appData.settings.colSchoolEnd;
            document.getElementById("col-hol-week").value = appData.settings.colHolWeek;
            document.getElementById("col-hol-end").value = appData.settings.colHolEnd;
            document.getElementById("school-start").value = appData.settings.schoolStart;
            document.getElementById("school-end").value = appData.settings.schoolEnd;
            document.getElementById("holiday-start").value = appData.settings.holidayStart;
            document.getElementById("holiday-end").value = appData.settings.holidayEnd;
        }

        function saveAdminSettings() {
            appData.settings.colSchoolWeek = document.getElementById("col-school-week").value;
            appData.settings.colSchoolEnd = document.getElementById("col-school-end").value;
            appData.settings.colHolWeek = document.getElementById("col-hol-week").value;
            appData.settings.colHolEnd = document.getElementById("col-hol-end").value;
            appData.settings.schoolStart = document.getElementById("school-start").value;
            appData.settings.schoolEnd = document.getElementById("school-end").value;
            appData.settings.holidayStart = document.getElementById("holiday-start").value;
            appData.settings.holidayEnd = document.getElementById("holiday-end").value;
            
            saveData();
            alert("Admin settings saved successfully!");
            renderCalendar(); 
        }

        function renderAdminActivities() {
            let list = document.getElementById("activity-list");
            list.innerHTML = "";
            appData.activities.forEach((act, index) => {
                let li = document.createElement("li");
                li.className = "activity-item";
                li.innerHTML = `
                    <span style="color: var(--gold);">${act}</span>
                    <button class="delete-btn" onclick="removeActivityDef(${index})">Remove</button>
                `;
                list.appendChild(li);
            });
        }

        function addActivityDef() {
            let input = document.getElementById("new-activity");
            let val = input.value.trim();
            if (val && !appData.activities.includes(val)) {
                appData.activities.push(val);
                input.value = "";
                saveData();
                renderAdminActivities();
            }
        }

        function removeActivityDef(index) {
            if(confirm("Remove this activity from the dropdown options?")) {
                appData.activities.splice(index, 1);
                saveData();
                renderAdminActivities();
            }
        }
    </script>
</body>
</html>
